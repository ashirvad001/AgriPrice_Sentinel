route:
  receiver: "email-config"
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: "email-config"
    email_configs:
      - to: "admin@example.com"
        from: "alertmanager-msp@example.com"
        smarthost: "smtp.example.com:587"
        auth_username: "user"
        auth_password: "password"
