global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "fastapi"
    static_configs:
      - targets: ["api:8000"]
    # If the metrics are exposed via prometheus_client on /metrics
